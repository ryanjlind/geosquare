<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>GeoSquare Preview</title>

    <script src="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.118/Build/Cesium/Widgets/widgets.css" rel="stylesheet">

    <style>
        html, body, #cesiumContainer {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
    </style>
</head>

<body>
<div id="cesiumContainer"></div>

<script type="module">
import { initCesium, renderAllSquares } from '/static/js/map.js';

const params = new URLSearchParams(window.location.search);
const gameDate = params.get('game_date');

async function load() {
    await initCesium();

    const res = await fetch(`/api/all-daily-squares/preview?game_date=${gameDate}`);
    const data = await res.json();

    await renderAllSquares(data.rounds);
}

load();
</script>

</body>
</html>
